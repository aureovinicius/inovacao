name: Publicar Copa 2026 (dados + site no Pages)

# Gera os dados (football-data.org + notícias) e publica o site direto no GitHub Pages,
# SEM commitar nada no repositório — o histórico do git fica limpo (só commits de código).
# Requer: Settings → Pages → Source = "GitHub Actions".

on:
  schedule:
    - cron: '0 */2 * * *'   # a cada 2 horas (UTC)
  workflow_dispatch:        # permite rodar manualmente
  push:
    branches: [main]        # republica a cada mudança de código

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concorrentes; não cancela um deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # As etapas de dados NÃO bloqueiam o deploy: se a API/rede falhar, o site
      # (código) ainda publica com os dados que houver. Evita que um rate-limit da
      # football-data trave a publicação de correções do app.
      - name: Buscar dados da football-data.org
        continue-on-error: true
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-data.mjs

      - name: Gerar notícias (RSS + resumo por IA)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-news.mjs

      - name: Calibrar o modelo (backtest histórico + tempering)
        continue-on-error: true
        run: node scripts/calibrate.mjs

      - name: Calcular probabilidades (Elo + Monte Carlo)
        continue-on-error: true
        run: node scripts/predict.mjs

      - name: Montar o site (arquivos públicos)
        run: |
          mkdir -p _site
          cp -r index.html privacy.html manifest.json sw.js css js data icons flags _site/
          touch _site/.nojekyll

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
