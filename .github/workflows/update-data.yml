name: Publicar Copa 2026 (dados + site no Pages)

# Gera os dados (football-data.org + notícias) e publica o site direto no GitHub Pages,
# SEM commitar nada no repositório — o histórico do git fica limpo (só commits de código).
# Requer: Settings → Pages → Source = "GitHub Actions".

on:
  schedule:
    - cron: '0 */2 * * *'   # a cada 2 horas (UTC)
  workflow_dispatch:        # permite rodar manualmente
  push:
    branches: [main]        # republica a cada mudança de código

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concorrentes; não cancela um deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Buscar dados da football-data.org
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-data.mjs

      - name: Gerar notícias (RSS + resumo por IA)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-news.mjs

      - name: Calibrar o modelo (backtest histórico + tempering)
        run: node scripts/calibrate.mjs

      - name: Calcular probabilidades (Elo + Monte Carlo)
        run: node scripts/predict.mjs

      - name: Montar o site em /copa (deploy via Actions)
        run: |
          mkdir -p _site/copa
          cp -r index.html manifest.json sw.js css js data icons _site/copa/
          cp CNAME _site/CNAME
          printf '<!doctype html><html lang="pt-br"><meta charset="utf-8"><title>Copa 2026</title><meta http-equiv="refresh" content="0; url=copa/"><link rel="canonical" href="copa/"><body style="background:#0c1118;color:#e8eef5;font-family:system-ui;text-align:center;padding:48px"><a href="copa/" style="color:#1db954">Copa 2026 \xe2\x86\x92</a>' > _site/index.html
          touch _site/.nojekyll

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
