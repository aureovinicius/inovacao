name: Atualizar dados da Copa 2026

on:
  schedule:
    - cron: '0 9 * * *'   # todo dia às 09:00 UTC (~06:00 BRT)
  workflow_dispatch:        # permite rodar manualmente pelo painel do GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Buscar dados da football-data.org
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-data.mjs

      - name: Gerar notícias (RSS + resumo por IA)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-news.mjs

      - name: Commitar atualizações (se houver)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "chore: atualização diária dos dados da Copa 2026"
            git push
          else
            echo "Nenhuma mudança nos dados."
          fi
