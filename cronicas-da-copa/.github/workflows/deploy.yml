# Publica "Crônicas da Copa" no GitHub Pages (site estático, sem build).
# Em Settings → Pages → Source: GitHub Actions.
name: Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Montar _site (só os arquivos do jogo)
        run: |
          mkdir -p _site
          cp -r index.html manifest.webmanifest sw.js css js data icons _site/
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
